  }
  .card-price.no-price {

    color: #8a7f74;
    font-weight: 400;
  }
  .card-meta {

    align-items: center;
    gap: 10px;

  }
  .card-pref {

  .card-stars {

    margin-top: 6px;

let currentRegion = '関東';
let currentSort = 'default';

function getPrice(d) {
  const n = parseInt(d.price);
  return isNaN(n) ? null : n;
}

function getRec(d) {
  const n = parseInt(d.rec);
  return isNaN(n) ? 0 : n;
}

function sorted(arr) {
  const copy = [...arr];
  if (currentSort === 'price-asc') {
    copy.sort((a, b) => {
      const pa = getPrice(a), pb = getPrice(b);
      if (pa === null && pb === null) return 0;
      if (pa === null) return 1;
      if (pb === null) return -1;
      return pa - pb;
    });
  } else if (currentSort === 'price-desc') {
    copy.sort((a, b) => {
      const pa = getPrice(a), pb = getPrice(b);
      if (pa === null && pb === null) return 0;
      if (pa === null) return 1;
      if (pb === null) return -1;
      return pb - pa;
    });
  } else if (currentSort === 'rec-desc') {
    copy.sort((a, b) => getRec(b) - getRec(a));
  }
  return copy;
}

function stars(rec) {
  const n = parseInt(rec);
  if (isNaN(n)) return '';
  return '★'.repeat(n) + '☆'.repeat(3 - n);
}

function render() {
  const list = document.getElementById('list');
  const filtered = ALL_DATA.filter(d => d.region === currentRegion);
  const items = sorted(filtered);
  list.innerHTML = items.map(d => {
    const p = getPrice(d);
    const priceHtml = p !== null
      ? `¥${p.toLocaleString('ja-JP')}<span class="card-night"> /泊</span>`
      : '';
    const priceClass = p !== null ? 'card-price' : 'card-price no-price';
    const priceDisplay = p !== null ? priceHtml : 'MMPなし';
    const comment = d.comment ? `<div class="card-comment">${d.comment}</div>` : '';
    return `
      <div class="card">
        <div class="card-top">
          <div class="card-name">${d.name}</div>
          <div class="${priceClass}">${priceDisplay}</div>
        </div>
        <div class="card-meta">
          <span class="card-pref">${d.pref}</span>
          <span class="card-stars">${stars(d.rec)}</span>
        </div>
        ${comment}
      </div>`;
  }).join('');
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentRegion = tab.dataset.region;
  render();
});

document.getElementById('sort-bar').addEventListener('click', e => {
  const btn = e.target.closest('.sort-btn');
  if (!btn) return;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = btn.dataset.sort;
  render();
});

render();
</script>
